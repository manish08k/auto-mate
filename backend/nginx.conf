# ================================================================
#  nginx.conf — FlowApp
#  Routes:
#    /api/*      → backend API  (port 4000)
#    /webhook/*  → backend API  (port 4000, no rate limit)
#    /*          → frontend     (port 3000)
# ================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {

  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ──────────────────────────────────────────────────

  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;

  # ── Performance ───────────────────────────────────────────────

  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain text/css application/json
                     application/javascript text/xml application/xml
                     application/x-font-ttf font/opentype image/svg+xml;
  gzip_min_length    1024;
  gzip_comp_level    6;

  # ── Security Headers ──────────────────────────────────────────

  add_header X-Frame-Options           "SAMEORIGIN"               always;
  add_header X-Content-Type-Options    "nosniff"                  always;
  add_header X-XSS-Protection          "1; mode=block"            always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy        "camera=(), microphone=()" always;
  server_tokens off;

  # ── Rate Limiting Zones ───────────────────────────────────────

  # General API — 100 req/min per IP
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

  # Auth endpoints — stricter: 10 req/min per IP
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;

  # Webhook ingest — 60 req/min per IP
  limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=60r/m;

  # ── Upstream Services ─────────────────────────────────────────

  upstream api_backend {
    server api:4000;
    keepalive 32;
  }

  upstream frontend_app {
    server frontend:3000;
    keepalive 16;
  }

  # ================================================================
  #  HTTP → HTTPS redirect  (uncomment in production)
  # ================================================================
  # server {
  #   listen 80;
  #   server_name yourdomain.com www.yourdomain.com;
  #   return 301 https://$host$request_uri;
  # }

  # ================================================================
  #  Main Server Block
  # ================================================================

  server {
    listen 80;
    # listen 443 ssl http2;            # uncomment for HTTPS
    server_name localhost;

    # ── SSL (uncomment in production) ──────────────────────────
    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    client_max_body_size 10M;

    # ── Health check (used by load balancers / Docker) ─────────

    location = /health {
      proxy_pass         http://api_backend/health;
      proxy_http_version 1.1;
      access_log         off;
    }

    # ── Auth routes — strict rate limit ────────────────────────

    location ~ ^/api/auth/ {
      limit_req zone=auth_limit burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
    }

    # ── Webhook ingest — own rate limit ────────────────────────

    location ~ ^/webhook/ {
      limit_req zone=webhook_limit burst=20 nodelay;
      limit_req_status 429;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      proxy_read_timeout 30s;
    }

    # ── General API ────────────────────────────────────────────

    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;
      limit_req_status 429;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_set_header   Upgrade           $http_upgrade;  # WebSocket support

      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
      proxy_send_timeout    60s;
    }

    # ── Frontend (SPA — all unmatched routes go to React) ──────

    location / {
      proxy_pass         http://frontend_app;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";  # Vite HMR WebSocket

      # SPA fallback — serve index.html for client-side routes
      proxy_intercept_errors on;
      error_page 404 = /index.html;
    }

    # ── Static asset caching ───────────────────────────────────

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass         http://frontend_app;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;

      expires            1y;
      add_header         Cache-Control "public, immutable";
      access_log         off;
    }

    # ── Error pages ────────────────────────────────────────────

    error_page 429 /429.json;
    location = /429.json {
      return 429 '{"success":false,"code":429,"error":"Too many requests. Please slow down."}';
      add_header Content-Type application/json always;
    }

    error_page 502 503 504 /50x.json;
    location = /50x.json {
      return 502 '{"success":false,"code":502,"error":"Service temporarily unavailable."}';
      add_header Content-Type application/json always;
    }
  }
}