# ================================================================
#  docker-compose.yml — FlowApp
#  Runs: frontend · backend api · worker · postgres · redis · nginx
#
#  Development:  docker compose up
#  Production:   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ================================================================

version: "3.9"

services:

  # ── PostgreSQL ──────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: flowapp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-flowapp}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-flowapp}"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - flowapp_net

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flowapp_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - flowapp_net

  # ── Backend API ─────────────────────────────────────────────────
  api:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     production
    container_name: flowapp_api
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV:   ${NODE_ENV:-development}
      DB_HOST:    postgres
      REDIS_HOST: redis
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api_logs:/app/logs
      # Dev only: hot-reload source (comment out in prod)
      - ./backend/src:/app/src
    healthcheck:
      test:     ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout:  10s
      retries:  3
    networks:
      - flowapp_net

  # ── BullMQ Worker ───────────────────────────────────────────────
  worker:
    build:
      context:    ./backend
      dockerfile: Dockerfile
      target:     production
    container_name: flowapp_worker
    restart: unless-stopped
    command: ["node", "src/queue/queueWorker.js"]
    env_file: ./backend/.env
    environment:
      NODE_ENV:            ${NODE_ENV:-development}
      DB_HOST:             postgres
      REDIS_HOST:          redis
      WORKER_CONCURRENCY:  ${WORKER_CONCURRENCY:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - worker_logs:/app/logs
      - ./backend/src:/app/src   # Dev hot-reload — remove in prod
    networks:
      - flowapp_net
    deploy:
      replicas: 1                # scale to 2+ in prod: docker compose up --scale worker=2

  # ── Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context:    ./frontend
      dockerfile: Dockerfile       # assumes a separate frontend Dockerfile
    container_name: flowapp_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - flowapp_net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: flowapp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro            # mount SSL certs in production
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - flowapp_net

# ── Volumes ──────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  api_logs:
    driver: local
  worker_logs:
    driver: local
  nginx_logs:
    driver: local

# ── Networks ─────────────────────────────────────────────────────

networks:
  flowapp_net:
    driver: bridge